# Fly.io deployment for the Reliable Webhook Delivery Platform.
#
# Three process groups run from the SAME image:
#   - app      : the FastAPI HTTP API (ingestion, CRUD, inspection, /showcase/*)
#   - worker   : the delivery loop (claims due deliveries, signs + POSTs, retries)
#   - producer : the live-showcase producer (polls real crypto prices, POSTs
#                real events to /events, exposes POST /burst over private networking)
#
# Migrations + showcase seeding run once per deploy via [deploy].release_command,
# before the new version takes traffic. See docs/DEPLOY.md for the full step-by-step.
#
# Rename `app` below to your actual Fly app name (set by `fly launch`).

app = "hookit"
primary_region = "iad"  # change to a region near you / your Postgres

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Runs in a temporary machine on the new image before release. Both idempotent:
  # migrate the schema, then seed the shared showcase project/endpoints/key.
  release_command = "sh -c 'alembic upgrade head && python -m app.seed_showcase'"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker = "python -m app.worker"
  producer = "python -m producer"

# Non-secret config (applies to all process groups). Secrets are set separately
# with `fly secrets set` — see docs/DEPLOY.md:
#   SHOWCASE_API_KEY, PLATFORM_API_KEY (same value), SHOWCASE_DISCORD_WEBHOOK_URL.
[env]
  # This app's own public hostname, used to build the controllable receiver URL
  # for the /showcase/* demo routes.
  PUBLIC_BASE_URL = "https://hookit.fly.dev"
  # The producer publishes to the real public ingestion API over HTTPS.
  PLATFORM_API_URL = "https://hookit.fly.dev"
  # The app proxies POST /showcase/burst to the producer over Fly private
  # networking (6PN); the producer's control server binds 0.0.0.0:8100.
  PRODUCER_BASE_URL = "http://producer.process.hookit.internal:8100"
  # Public Discord server/channel ids for the dashboard's embedded live widget.
  DISCORD_WIDGET_SERVER_ID = "1522017033871687811"
  DISCORD_WIDGET_CHANNEL_ID = "1522017123298185451"
  # Showcase retry tuning: a full retry → dead-letter cycle stays watchable
  # (~5+10+20+40 s ≈ 75 s across 5 attempts) instead of the production-default
  # ~5 minutes. The dashboard's fast-forward button remains the impatient path.
  RETRY_BASE_SECONDS = "5"
  RETRY_CAP_SECONDS = "60"
  MAX_DELIVERY_ATTEMPTS = "5"
  # The worker process runs three independent claim loops (own session + name
  # each) so FOR UPDATE SKIP LOCKED claiming is visibly concurrent on one VM.
  WORKER_CONCURRENCY = "3"

# HTTP is served only by the `app` process group.
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true        # let idle app machines stop to save money
  auto_start_machines = true       # auto-start on the next request (~1s cold start)
  min_machines_running = 0         # scale to zero when idle; set to 1 to keep warm
  processes = ["app"]

  [http_service.http_options]
    # /health is the cheap liveness probe (no DB dependency).
    [[http_service.checks]]
      method = "GET"
      path = "/health"
      interval = "15s"
      timeout = "2s"
      grace_period = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
