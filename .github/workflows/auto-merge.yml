name: Auto-merge approved PRs

# Closes the autonomous loop: when the Reviewer adds `agent:approved`, this waits
# for CI to pass and then squash-merges the PR. The merge (made with a PAT) pushes
# to main, which re-triggers the Builder for the next issue.
#
# Gate = deterministic CI ("Lint, type-check, test") green AND `agent:approved`
# present AND `agent:changes-needed` absent.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate for auto-merge"
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  merge:
    name: Merge if approved and green
    runs-on: ubuntu-latest
    # Only proceed when approval just landed (or a manual dispatch).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'agent:approved'
    env:
      GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
    steps:
      - name: Verify approval labels
        run: |
          labels=$(gh pr view "$PR" --repo "$REPO" --json labels -q '.labels[].name')
          echo "Labels: $labels"
          echo "$labels" | grep -qx "agent:approved"       || { echo "Not approved — skipping."; exit 0; }
          if echo "$labels" | grep -qx "agent:changes-needed"; then
            echo "Has agent:changes-needed — skipping."; exit 0
          fi
          echo "approved=true" >> "$GITHUB_ENV"

      - name: Wait for CI to pass
        if: env.approved == 'true'
        run: |
          # Read CI status from the Actions runs API (needs only Actions: Read,
          # which AGENT_GH_TOKEN has). We deliberately avoid `gh pr checks` and
          # the check-runs/statuses APIs — those require a "Checks"/"Commit
          # statuses" permission that fine-grained PATs gate separately and that
          # returned 403, silently stalling this wait. Match the CI workflow by
          # file path; `status` is queued/in_progress/completed and `conclusion`
          # is success/failure/... (null until completed). Re-read the head SHA
          # each loop in case the Builder pushes a new commit.
          CI_PATH=".github/workflows/ci.yml"
          for i in $(seq 1 40); do
            sha=$(gh pr view "$PR" --repo "$REPO" --json headRefOid -q '.headRefOid')
            read -r status conclusion < <(gh api \
              "repos/$REPO/actions/runs?head_sha=$sha&event=pull_request" \
              -q '.workflow_runs[] | select(.path=="'"$CI_PATH"'") | "\(.status) \(.conclusion)"' \
              | head -1)
            if [ "$status" = "completed" ]; then
              case "$conclusion" in
                success) echo "CI passed."; exit 0 ;;
                *) echo "CI did not pass (conclusion=$conclusion) — leaving PR for the Builder/Reviewer."; exit 1 ;;
              esac
            fi
            echo "[$i] CI status=${status:-not-found} conclusion=${conclusion:-none}; waiting..."
            sleep 15
          done
          echo "Timed out waiting for CI."; exit 1

      - name: Squash-merge and start the next build
        if: env.approved == 'true'
        run: |
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
          echo "Merged PR #$PR. Dispatching the Builder for the next issue."
          gh workflow run agent-builder.yml --repo "$REPO"
