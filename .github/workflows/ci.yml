name: CI

# Quality gate. Mirrors the four required commands in CLAUDE.md §3 exactly.
# Runs on every PR into main and on pushes to main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: mypy
        run: mypy app tests

      - name: pytest
        run: pytest
