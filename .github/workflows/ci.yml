name: CI

# Quality gate. Mirrors the four required commands in CLAUDE.md §3 exactly.
# Runs on every PR into main and on pushes to main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: webhook
          POSTGRES_PASSWORD: webhook
          POSTGRES_DB: webhook
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U webhook -d webhook"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://webhook:webhook@localhost:5432/webhook

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: mypy
        run: mypy app tests

      - name: pytest
        run: pytest
